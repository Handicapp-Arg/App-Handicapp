services:
  - type: web
    name: handicapp-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/main
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # --- Server ---
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false        # set en dashboard: "https://app.handicapp.com,https://www.handicapp.com"

      # --- Database (PostgreSQL) ---
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false

      # --- Auth ---
      - key: JWT_SECRET
        generateValue: true   # Render genera y fija un secreto largo de manera automática
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: SKIP_DEV_SEED
        value: "true"

      # --- Cloudinary ---
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # --- Email (Resend) ---
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false

      # --- Observabilidad ---
      - key: SENTRY_DSN
        sync: false

      # --- Reglas de negocio ---
      - key: HEALTH_REMINDER_DAYS
        value: 30

      # --- MercadoPago (suscripciones) ---
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false        # token de PRODUCCIÓN (APP_USR-...) desde developers.mercadopago.com
      - key: MP_BACK_URL
        sync: false        # a dónde vuelve tras pagar, ej: https://app.handicapp.com/perfil

      # --- WhatsApp (Meta Cloud API) ---
      - key: WHATSAPP_TOKEN
        sync: false        # dejar vacío = WhatsApp deshabilitado (no rompe)
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v21.0
      - key: WHATSAPP_TEMPLATE_LANG
        value: es_AR
      - key: WHATSAPP_TEMPLATE_HEALTH
        value: recordatorio_salud
      - key: WHATSAPP_TEMPLATE_MEDICAL
        value: recordatorio_medico
